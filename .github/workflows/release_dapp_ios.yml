name: iOS Dapp (production) deploy

on:
  workflow_dispatch:
  # pull_request:
  #   types:
  #     - closed

# inputs:
# working-directory
# flavor
# BUNDLE_ID

jobs:
  build:
    # if: (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master') || github.event_name == 'workflow_dispatch'
    runs-on: macos-26

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup SSH for Match certificates repository
      - name: Setup SSH for Match
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}

      # Cache
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            .build
            SourcePackagesCache
            DerivedDataCache
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Install Flutter and Dependencies
      - uses: ./.github/actions/dependencies
        with:
            platform: 'ios'

      # Build App
      - name: Build App
        working-directory: packages/reown_appkit/example/base
        env:
          PROJECT_ID: ${{ secrets.DAPP_PROJECT_ID }}
          DAPP_SENTRY_DSN: ${{ secrets.DAPP_SENTRY_DSN_PROD }}
        run: |
          PUBSPEC_FILE=pubspec.yaml
          FILE_VALUE=$(grep "^version: " $PUBSPEC_FILE)
          PARTS=(${FILE_VALUE//:/ })
          FULL_VERSION=${PARTS[1]}
          VERSION_NUMBER=${FULL_VERSION%%-*}

          flutter build ios --flavor production --build-name $VERSION_NUMBER --dart-define="PROJECT_ID=$PROJECT_ID" --dart-define="DAPP_SENTRY_DSN=$DAPP_SENTRY_DSN" --config-only --release

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_26.1.app

      # Fastlane
      - name: Fastlane
        id: fastlane
        working-directory: packages/reown_appkit/example/base/ios
        env:
          FLAVOR: "production"
          PROJECT_NAME: "AppKit Flutter"
          BUNDLE_ID: "com.walletconnect.flutterdapp"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_DAPP_ID: ${{ secrets.APPLE_DAPP_ID }}
          PROJECT_ID: ${{ secrets.DAPP_PROJECT_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          TESTFLIGHT_URL: ${{ secrets.TESTFLIGHT_URL_DAPP }}
        run: |
          PUBSPEC_FILE=../pubspec.yaml
          FILE_VALUE=$(grep "^version: " $PUBSPEC_FILE)
          PARTS=(${FILE_VALUE//:/ })
          FULL_VERSION=${PARTS[1]}
          VERSION_NUMBER=${FULL_VERSION%%-*}

          fastlane release_testflight username:$APPLE_ID project_id:$PROJECT_ID app_id:$APPLE_DAPP_ID app_store_key_id:$APP_STORE_KEY_ID apple_issuer_id:$APPLE_ISSUER_ID match_git_url:$MATCH_GIT_URL app_version:$VERSION_NUMBER flavor:production

      # Send Slack notification
      - name: Send Slack notification
        if: always() && !cancelled()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "iOS Build Report - ${{ env.PROJECT_NAME }} - ${{ env.FLAVOR }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🍎 iOS Build Report" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Project:*\n`${{ env.PROJECT_NAME }}`" },
                    { "type": "mrkdwn", "text": "*Release Type:*\n`${{ env.FLAVOR }}`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Build & TestFlight:*\n`${{ steps.fastlane.outcome == 'success' && '✅ Success' || '❌ Failed' }}`" },
                    { "type": "mrkdwn", "text": "*Overall Status:*\n`${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }${{ steps.fastlane.outcome == 'success' && env.TESTFLIGHT_URL != '' && format(',{{"type":"button","text":{{"type":"plain_text","text":"View in TestFlight"}},"url":"{0}"}}', env.TESTFLIGHT_URL) || '' }}
                  ]
                }
              ]
            }
        env:
          PROJECT_NAME: "AppKit Flutter"
          FLAVOR: "production"
          TESTFLIGHT_URL: ${{ secrets.TESTFLIGHT_URL_DAPP }}

# Launch locally
# act -j build --container-architecture linux/amd64 -P macos-26=-self-hosted --secret-file .github/workflows/.env.secret -W .github/workflows/release_dapp_ios.yml
# act --container-architecture linux/amd64 -P macos-26=-self-hosted --secret-file .github/workflows/.env.secret -W .github/workflows/release_dapp_ios.yml workflow_dispatch
