name: Android Wallet (production) deploy

on:
  workflow_dispatch:
  # pull_request:
  #   types:
  #     - closed

# inputs:
# working-directory
# flavor
# BUNDLE_ID

jobs:
  build:
    # if: (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up environment
      - uses: ./.github/actions/dependencies
        with:
          platform: 'android'

      # Setup Firebase CLI with service account
      - name: Setup Firebase
        run: |
          npm install -g firebase-tools@13.0.1
          echo '${{ secrets.GSA_KEY }}' > ${{ runner.temp }}/gcp_key.json
          chmod 600 ${{ runner.temp }}/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/gcp_key.json" >> $GITHUB_ENV

      # Add Secrets file on wallet
      - name: Add Secrets file
        working-directory: packages/reown_walletkit/example/android
        run: touch secrets.properties && echo "${{ secrets.SECRETS_FILE }}" >> secrets.properties

      # Add Keystore file on dapp
      - name: Add Keystore file
        working-directory: packages/reown_walletkit/example/android
        run: echo "${{ secrets.KEYSTORE }}" | base64 --decode >> app/debug.keystore

      # Fastlane
      - name: Fastlane
        id: fastlane
        working-directory: packages/reown_walletkit/example/android
        env:
          FLAVOR: "production"
          PROJECT_NAME: "WalletKit Flutter"
          PROJECT_ID: ${{ secrets.WALLET_PROJECT_ID }}
          WALLET_SENTRY_DSN: ${{ secrets.WALLET_SENTRY_DSN_PROD }}
          WCP_API_KEY: ${{ secrets.WCP_API_KEY }}
          FIREBASE_WALLET_ID: ${{ secrets.FIREBASE_WALLET_ID }}
          DOWNLOAD_URL: ${{ secrets.DOWNLOAD_URL_WALLET }}
        run: |
          PUBSPEC_FILE=../pubspec.yaml
          FILE_VALUE=$(grep "^version: " $PUBSPEC_FILE)
          PARTS=(${FILE_VALUE//:/ })
          FULL_VERSION=${PARTS[1]}
          VERSION_NUMBER=${FULL_VERSION%%-*}

          fastlane add_plugin firebase_app_distribution
          fastlane release_firebase project_id:$PROJECT_ID app_version:$VERSION_NUMBER

      # Send Slack notification
      - name: Send Slack notification
        if: always() && !cancelled()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Android Build Report - ${{ env.PROJECT_NAME }} - ${{ env.FLAVOR }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🤖 Android Build Report" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Project:*\n`${{ env.PROJECT_NAME }}`" },
                    { "type": "mrkdwn", "text": "*Release Type:*\n`${{ env.FLAVOR }}`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Build & Firebase:*\n`${{ steps.fastlane.outcome == 'success' && '✅ Success' || '❌ Failed' }}`" },
                    { "type": "mrkdwn", "text": "*Overall Status:*\n`${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }${{ steps.fastlane.outcome == 'success' && env.DOWNLOAD_URL != '' && format(',{{"type":"button","text":{{"type":"plain_text","text":"View in Firebase"}},"url":"{0}"}}', env.DOWNLOAD_URL) || '' }}
                  ]
                }
              ]
            }
        env:
          PROJECT_NAME: "WalletKit Flutter"
          FLAVOR: "production"
          DOWNLOAD_URL: ${{ secrets.DOWNLOAD_URL_WALLET }}

# Launch locally
# Remove build: if:
# act -j build --container-architecture linux/amd64 -P macos-14=-self-hosted --secret-file .github/workflows/.env.secret -W .github/workflows/release_wallet_android.yml
