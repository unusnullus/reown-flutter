name: reown_walletkit
description: "Reown is the onchain UX platform that provides toolkits built on top of the WalletConnect Network"
version: 1.3.8
homepage: https://github.com/reown-com/reown_flutter
repository: https://github.com/reown-com/reown_flutter/tree/master/packages/reown_walletkit
documentation: https://docs.reown.com/walletkit/flutter/installation

environment:
  sdk: ">=3.8.0"

dependencies:
  event: ^3.1.0
  flutter:
    sdk: flutter
  reown_core:
    git:
      url: https://github.com/unusnullus/reown-flutter
      path: packages/reown_core
      ref: bugfix/fix-ios-crash-related-to-secure-storage
  reown_sign:
    git:
      url: https://github.com/unusnullus/reown-flutter
      path: packages/reown_sign
      ref: bugfix/fix-ios-crash-related-to-secure-storage

dev_dependencies:
  build_runner: ^2.4.13
  build_version: ^2.1.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  http: ^1.2.2
  logger: ^2.5.0
  mockito: ^5.4.4
  package_info_plus: ^9.0.0
  reown_appkit:
    git:
      url: https://github.com/unusnullus/reown-flutter
      path: packages/reown_appkit
      ref: bugfix/fix-ios-crash-related-to-secure-storage

platforms:
  android:
  ios:
  web:
  macos:
  linux:
  windows:
